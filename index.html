<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>a website</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="a website. it exists.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #f4f1ea;
    color: #1a1a1a;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    cursor: default;
  }
  main { max-width: 480px; }
  h1 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 1.2rem;
  }
  h1 .blink {
    display: inline-block;
    width: 0.55ch;
    background: #1a1a1a;
    color: #1a1a1a;
    animation: blink 1.1s steps(2, start) infinite;
    margin-left: 2px;
    vertical-align: -2px;
  }
  @keyframes blink { to { visibility: hidden; } }
  p {
    font-size: 1.05rem;
    line-height: 1.6;
    color: #555;
    margin-bottom: 0.8rem;
  }
  .tiny {
    margin-top: 2.5rem;
    font-size: 0.78rem;
    color: #999;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .tiny a { color: #999; text-decoration: none; border-bottom: 1px dotted #bbb; }
  .tiny a:hover { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  #log {
    margin-top: 1.4rem;
    font-size: 0.85rem;
    color: #888;
    font-style: italic;
    min-height: 1.2em;
  }
</style>
</head>
<body>
  <main>
    <h1>hello<span class="blink">&nbsp;</span></h1>
    <p>this is a website.</p>
    <p>it exists.</p>
    <p>that is, frankly, the whole pitch.</p>
    <div id="log"></div>
    <div class="tiny">
      <span id="counter">you are guest #1</span> &middot;
      <a href="#" id="more">more nothing</a>
    </div>
  </main>
<script>
  // a very official guest counter (do not audit)
  const c = document.getElementById('counter');
  c.textContent = 'you are guest #' + Math.floor(Math.random() * 90000 + 10000);

  const log = document.getElementById('log');
  const nothings = [
    'still nothing.',
    'a deeper nothing.',
    'profound nothing.',
    'okay now you\'re just being thorough.',
    'nothing again. art.',
    'truly impressive commitment to nothing.',
    'you have unlocked: nothing.',
    'fine. here\'s a pebble. 🪨 ...just kidding, nothing.',
    'this is the last nothing. probably.',
    'i lied. one more nothing.'
  ];
  let i = 0;
  document.getElementById('more').addEventListener('click', (e) => {
    e.preventDefault();
    log.textContent = nothings[i % nothings.length];
    i++;
  });
</script>
</body>
</html>
